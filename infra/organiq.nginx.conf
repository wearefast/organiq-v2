server {
    server_name api.rankorganiq.com;

    location / {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Intercept 502/503/504 so nginx-generated error pages also carry CORS headers.
        # Without this, a brief restart causes the browser to throw "Failed to fetch"
        # instead of receiving a proper error response.
        proxy_intercept_errors on;
        error_page 502 503 504 = @gateway_error;
    }

    location @gateway_error {
        add_header 'Access-Control-Allow-Origin' 'https://app.rankorganiq.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        add_header 'Content-Type' 'application/json' always;
        return 503 '{"message":"Service temporarily unavailable. Please try again in a moment.","statusCode":503}';
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.rankorganiq.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.rankorganiq.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = api.rankorganiq.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name api.rankorganiq.com;
    return 404; # managed by Certbot

}

name: Deploy to AWS EC2
# Last triggered: 2026-06-22

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'tsconfig.base.json'
      - '.github/workflows/deploy.yml'

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: organiq-server-prod

jobs:
  deploy:
    name: Build & Deploy NestJS to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f server/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            echo "Logging into ECR..."
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            
            echo "Pulling latest image..."
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

            echo "Applying database migrations..."
            docker run --rm \
              --env-file /opt/organiq/.env \
              ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest \
              node -e '
                const { Pool } = require("pg");
                const fs = require("fs");
                const url = process.env.DATABASE_URL;
                const ssl = url && url.includes("rds.amazonaws.com") ? { rejectUnauthorized: false } : undefined;
                const pool = new Pool({ connectionString: url, ssl });
                const files = fs.readdirSync("/app/drizzle")
                  .filter(f => f.endsWith(".sql"))
                  .sort();
                (async () => {
                  for (const file of files) {
                    const raw = fs.readFileSync("/app/drizzle/" + file, "utf-8");
                    const stmts = raw.split("--> statement-breakpoint").map(s => s.trim()).filter(Boolean);
                    for (const stmt of stmts) {
                      try { await pool.query(stmt); }
                      catch (e) {
                        if (/already exists|duplicate/.test(e.message)) { continue; }
                        throw e;
                      }
                    }
                    console.log("Applied: " + file);
                  }
                  await pool.end();
                  console.log("Migrations complete.");
                })().catch(e => { console.error("Migration error:", e.message); process.exitCode = 1; pool.end(); });
              '

            echo "Stopping and removing old container..."
            docker stop organiq-server 2>/dev/null || true
            docker rm organiq-server 2>/dev/null || true
            
            echo "Removing dangling images..."
            docker image prune -f --filter "dangling=true" || true
            
            echo "Starting new container..."
            docker run -d \
              --name organiq-server \
              --restart unless-stopped \
              --env-file /opt/organiq/.env \
              -p 3002:3002 \
              ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            
            echo "Waiting for container to be healthy..."
            sleep 15
            
            echo "Verifying container is running..."
            if ! docker ps | grep -q organiq-server; then
              echo "ERROR: Container failed to start"
              docker logs organiq-server || true
              exit 1
            fi

            echo "Deployment successful!"
            echo "Deployment successful!"

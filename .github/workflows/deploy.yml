name: Deploy to AWS EC2

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'tsconfig.base.json'
      - '.github/workflows/deploy.yml'

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: organiq-server-prod

jobs:
  deploy:
    name: Build & Deploy NestJS to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f server/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Pull image while old container is still serving traffic (no downtime during pull)
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

            # Run DB migrations in a one-off container — old server stays up during this step
            docker run --rm \
              --env-file /opt/organiq/.env \
              ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest \
              npx drizzle-kit migrate
            echo "Migrations complete"

            # Hot-swap: image is pre-pulled so stop→start is near-instant (~1-2s downtime)
            docker stop organiq-server || true
            docker rm organiq-server || true
            docker run -d \
              --name organiq-server \
              --restart unless-stopped \
              --env-file /opt/organiq/.env \
              -p 3002:3002 \
              ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            echo "Deployment complete"

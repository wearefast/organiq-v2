name: Deploy to AWS EC2

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'tsconfig.base.json'
      - '.github/workflows/deploy.yml'

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: organiq-server-prod

jobs:
  deploy:
    name: Build & Deploy NestJS to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f server/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            echo "Logging into ECR..."
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            
            echo "Pulling latest image..."
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            
            echo "Stopping and removing old container..."
            docker stop organiq-server 2>/dev/null || true
            docker rm organiq-server 2>/dev/null || true
            
            echo "Removing dangling images..."
            docker image prune -f --filter "dangling=true" || true
            
            echo "Starting new container..."
            docker run -d \
              --name organiq-server \
              --restart unless-stopped \
              --env-file /opt/organiq/.env \
              -p 3002:3002 \
              ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            
            echo "Waiting for container to be healthy..."
            sleep 15
            
            echo "Verifying container is running..."
            if ! docker ps | grep -q organiq-server; then
              echo "ERROR: Container failed to start"
              docker logs organiq-server || true
              exit 1
            fi
            
            echo "==> Seeding migration journal (ensures __drizzle_migrations table exists)..."
            docker exec organiq-server node scripts/seed-migration-journal.js
            echo "==> Running database migrations..."
            docker exec organiq-server npx drizzle-kit migrate --config=drizzle.config.ts
            echo "==> Migrations complete"
            
            echo "Deployment successful!"
